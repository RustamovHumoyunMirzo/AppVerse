name: Wheels

on:
  workflow_call:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-13, macos-14, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: cp39-*
          CIBW_SKIP: "pp* *-musllinux_*"
          CIBW_ARCHS_WINDOWS: "AMD64 x86 ARM64"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_LINUX: "x86_64 aarch64"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_BEFORE_ALL_LINUX: "dnf install -y gtk3-devel webkit2gtk4.1-devel || dnf install -y gtk3-devel webkit2gtk3-devel"
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: "auditwheel repair -w {dest_dir} {wheel} --exclude libgtk-3.so.0 --exclude libgdk-3.so.0 --exclude libwebkit2gtk-4.1.so.0 --exclude libwebkit2gtk-4.0.so.37 --exclude libjavascriptcoregtk-4.1.so.0 --exclude libjavascriptcoregtk-4.0.so.18"
          CIBW_TEST_COMMAND: "python -c \"import appverse; print(appverse.HINT_NONE)\""

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
