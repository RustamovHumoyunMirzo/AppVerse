name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wheels:
    uses: ./.github/workflows/wheels.yml

  publish:
    name: Publish to PyPI
    needs: wheels
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*"
          merge-multiple: true
          path: artifacts

      - name: Prepare distributions
        shell: bash
        run: |
          mkdir -p dist
          find artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} dist/ \;
          find dist -maxdepth 1 -type f -print
          test "$(find dist -maxdepth 1 -type f \( -name "*.whl" -o -name "*.tar.gz" \) | wc -l)" -gt 0

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          attestations: false
